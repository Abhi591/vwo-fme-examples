<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modern Shop - Home</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vwo-fme-node-sdk@1/dist/client/vwo-fme-javascript-sdk.min.js" ></script>

<script>
  (async () => {
const vwoClient = await vwoSdk.init({
  accountId: '', // VWO Account ID
  sdkKey: '', // SDK Key,
  logger: {
    level: 'DEBUG',
  }
});

// Define the user context object to identify and provide user-specific details
const userContext = {
  id: '', // User UNIQUE ID
};

// Returns a flag object which can be used to get flag's status or variable(s)
const flag = await vwoClient.getFlag('testFlag', userContext); //FlagName

// Track a metric conversion for the specified event-name
vwoClient.trackEvent('e1', userContext);
})();
</script>


</head>

<body class="bg-gray-100 text-gray-800">
  <header class="bg-white shadow p-4 flex justify-between items-center">
    <h1 class="text-xl font-bold">🛍️ ModernShop</h1>
    <a href="cart.html" class="text-blue-600 hover:underline">Cart</a>
  </header>

  <main class="p-4 grid gap-4 md:grid-cols-2 lg:grid-cols-3" id="product-list">
    <!-- Populated by JS -->
  </main>

  <script type="module" src="js/home.js"></script>
</body>

</html>
