<ion-content [fullscreen]="true" class="smart-bot-content">
  <div class="container">
    
    <!-- Title -->
    <div class="title-section">
      <h1 class="screen-title">Smart Bot</h1>
    </div>

    <!-- User ID Section -->
    <div class="section">
      <ion-label class="section-label">User id</ion-label>
      <div class="input-row">
        <ion-item class="input-item">
          <input 
            [(ngModel)]="userId"
            placeholder="Enter User ID"
            [disabled]="isLoading"
            class="native-input"
            type="text">
        </ion-item>
        <ion-button 
          fill="clear" 
          size="small" 
          [disabled]="isLoading"
          (click)="onAssignClick()"
          class="assign-button"
          style="--background: #1976D2 !important; background: #1976D2 !important; color: #ffffff !important; border: 1px solid #1565C0 !important; border-radius: 12px !important; font-size: 16px !important; text-align: center !important; display: flex !important; justify-content: center !important; align-items: center !important;">
          Assign
        </ion-button>
      </div>
    </div>

    <!-- Search Query Section -->
    <div class="section">
      <ion-label class="section-label">Search a query</ion-label>
      <div class="input-row">
        <ion-item class="input-item">
          <input 
            [(ngModel)]="messageText"
            placeholder="Ask anything..."
            [disabled]="isLoading"
            class="native-input"
            type="text">
        </ion-item>
        <ion-button 
          fill="clear" 
          size="small" 
          [disabled]="isLoading"
          (click)="onSendClick()"
          class="send-button"
          style="--background: #1976D2 !important; background: #1976D2 !important; color: #ffffff !important; border: 1px solid #1565C0 !important; border-radius: 12px !important; font-size: 16px !important; text-align: center !important; display: flex !important; justify-content: center !important; align-items: center !important;">
          <ion-spinner name="crescent" *ngIf="isLoading"></ion-spinner>
          <span *ngIf="!isLoading">Send</span>
        </ion-button>
      </div>
    </div>

    <!-- Powered By Section -->
    <div *ngIf="featureModelName" class="powered-by-section">
      <span class="powered-by-label">Powered by</span>
      <span class="powered-by-value">{{ featureModelName }}</span>
    </div>

    <!-- Content Card -->
    <div class="content-card" [style.background-color]="featureBackground" *ngIf="featureContent">
      <div class="content-scroll">
        <p class="content-text">{{ featureContent }}</p>
      </div>
    </div>

    <!-- Loading Indicator -->
    <div *ngIf="isLoading && !featureContent" class="loading-container">
      <ion-spinner color="primary"></ion-spinner>
    </div>

    <!-- Error Display -->
    <div *ngIf="vwoError" class="error-message">
      <p><strong>Error:</strong> {{ vwoError }}</p>
    </div>

    <!-- Bottom Status Section -->
    <div class="bottom-status">
      <div class="status-row">
        <span class="status-label">Feature Flag Status:</span>
        <span class="status-value" [class.enabled]="isFeatureEnabled" [class.disabled]="!isFeatureEnabled">
          {{ isFeatureEnabled ? 'Enabled' : 'Disabled' }}
        </span>
        <span class="user-id-label">User ID:</span>
        <span class="user-id-value">{{ getDisplayUserId() }}</span>
      </div>
      
      <div class="logs-row" *ngIf="isVwoInitialized">
        <span class="show-logs-link" (click)="openLogs()">Show logs</span>
      </div>
    </div>

  </div>
</ion-content>
