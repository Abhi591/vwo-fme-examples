<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    <title>FME Example</title>
    <link rel="stylesheet" type="text/css" href="css/index.css">
    <!-- VWO FME JavaScript SDK -->
    <script 
        src="https://cdn.jsdelivr.net/npm/vwo-fme-node-sdk@1/dist/client/vwo-fme-javascript-sdk.min.js"
        onload="console.log('VWO SDK script loaded successfully from CDN')"
        onerror="console.error('Failed to load VWO SDK from CDN, trying local fallback'); loadVwoSdkFallback();">
    </script>
    <script>
        function loadVwoSdkFallback() {
            console.log('Loading VWO SDK from local fallback...');
            var script = document.createElement('script');
            script.src = 'js/vwo-fme-javascript-sdk.min.js';
            script.onload = function() {
                console.log('VWO SDK loaded successfully from local fallback');
            };
            script.onerror = function() {
                console.error('Failed to load VWO SDK from local fallback as well');
            };
            document.head.appendChild(script);
        }
    </script>
</head>
<body>
    <div class="smart-bot-content">
        <div class="container">
            
            <!-- Title Section -->
            <div class="title-section">
                <h1 class="screen-title">Smart Bot</h1>
            </div>

            <!-- User ID Section -->
            <div class="section">
                <label class="section-label">User id</label>
                <div class="input-row">
                    <div class="input-item">
                        <input 
                            id="userId"
                            type="text"
                            placeholder="Enter User ID"
                            class="native-input"
                            disabled>
                    </div>
                    <button 
                        id="assignButton"
                        class="assign-button"
                        disabled>
                        Assign
                    </button>
                </div>
            </div>

            <!-- Search Query Section -->
            <div class="section">
                <label class="section-label">Search a query</label>
                <div class="input-row">
                    <div class="input-item">
                        <input 
                            id="searchQuery"
                            type="text"
                            placeholder="Ask anything..."
                            class="native-input"
                            disabled>
                    </div>
                    <button 
                        id="sendButton"
                        class="send-button"
                        disabled>
                        <span class="spinner" id="sendSpinner" style="display: none;"></span>
                        <span id="sendText">Send</span>
                    </button>
                </div>
            </div>

            <!-- Powered By Section -->
            <div id="poweredBySection" class="powered-by-section" style="display: none;">
                <span class="powered-by-label">Powered by</span>
                <span class="powered-by-value" id="poweredByValue"></span>
            </div>

            <!-- Content Card -->
            <div id="contentCard" class="content-card" style="display: none;">
                <div class="content-scroll">
                    <p class="content-text" id="contentText"></p>
                </div>
            </div>

            <!-- Loading Indicator -->
            <div id="loadingContainer" class="loading-container" style="display: none;">
                <div class="spinner"></div>
            </div>

            <!-- Error Display -->
            <div id="errorMessage" class="error-message" style="display: none;">
                <p><strong>Error:</strong> <span id="errorText"></span></p>
            </div>

            <!-- Bottom Status Section -->
            <div class="bottom-status">
                <div class="status-row">
                    <span class="status-label">Feature Flag Status:</span>
                    <span class="status-value" id="featureFlagStatus">-</span>
                    <span class="user-id-label">User ID:</span>
                    <span class="user-id-value" id="userIdBottom">-</span>
                </div>
                
                <div class="logs-row" id="logsRow" style="display: none;">
                    <span class="show-logs-link" id="showLogs">Show logs</span>
                </div>
            </div>

        </div>
    </div>

    <!-- Logs Modal -->
    <div id="logsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">FME Logs</h3>
                <span class="close">&times;</span>
            </div>
            <div class="logs-content" id="logsContent">
                <div class="no-logs-message">
                    <p>No logs available yet. SDK logs will appear here after initialization and interactions.</p>
                </div>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="cordova.js"></script>
    <script type="text/javascript" src="js/config.js"></script>
    <script type="text/javascript" src="js/vwo-setup.js"></script>
    <script type="text/javascript" src="js/app.js"></script>
</body>
</html>
